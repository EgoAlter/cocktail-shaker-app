<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA: standalone mode, status bar -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shaker" />
  <meta name="theme-color" content="#0d0d0d" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />

  <!-- Playfair Display: premium serif for bar/hospitality display text.
       Inter: clean sans for small UI labels. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet" />

  <title>Cocktail Shaker</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0d0d;
    }

    #canvas {
      display: block;
      /* Prevents scroll hijack on touch — critical for sensor-driven interactions. */
      touch-action: none;
    }

    /* Overlay container for HTML UI screens (questionnaire, result, etc.).
       Positioned above the canvas, hidden by default. */
    #overlay {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="overlay"></div>

  <script type="module" src="/app.js"></script>
</body>
</html>
